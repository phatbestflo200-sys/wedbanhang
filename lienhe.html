<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop Bột và Kem Nhà Na</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            padding: 8px 40px;
            font-size: 14px;
            background: #fff;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
        }

        .search-box {
            display: flex;
            align-items: center;
            border: 1px solid #ddd;
            border-radius: 25px;
            padding: 6px 12px;
            width: 380px;
        }

        .search-box input {
            border: none;
            outline: none;
            flex: 1;
            font-size: 14px;
        }

        .search-box button {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 16px;
        }

        /* CART */
        .cart {
            font-size: 20px;
            cursor: pointer;
        }

        /* LINE */
        .line {
            border: none;
            border-top: 2px solid red;
        }

        .logo img {
            height: 40px;
        }

        .menu {
            border-top: 2px solid pink;
            border-bottom: 2px solid pink;
        }

        .menu .nav-link {
            padding: 15px 30px;
            font-weight: bold;
            color: #555;
        }

        .menu .nav-link.active,
        .menu .nav-link:hover {
            background-color: pink;
            color: white !important;
        }

        .search {
            border: 1px solid #ccc;
            padding: 8px 12px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            width: 300px;
        }

        .search input {
            border: none;
            outline: none;
            flex: 1;
        }

        .deltail-btn:hover {
            background: #ff6fae;
            color: white;
        }

        .pink-btn {
            background: linear-gradient(135deg, #ff6fae, #ff3d8e);
            color: white;
            border: none;
            padding: 9px 18px;
            border-radius: 999px;
            cursor: pointer;
            font-weight: 600;
            box-shadow: 0 5px 12px rgba(255, 105, 160, .35);
            transition: .2s;
        }

        .pink-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 18px rgba(255, 105, 160, .45);
        }
    </style>
</head>
<body>
    <div class="toast-box" id="toast"></div>
    <div class="top-bar">
        <span>Chào mừng bạn đến với Shop Mỹ Phẩm Nhà Na</span>
        <span>Hotline: 09134735437</span>
    </div>
    <div class="header">
        <div class="logo">
            <img src="logonhana.png" alt="">
        </div>
        <div class="search-box">
            <input placeholder="Tìm sản phẩm của bạn" type="text">
            <button>
                <i class="fa fa-search"></i>
            </button>
        </div>
        <div class="cart">
            <i class="fa fa-shopping-cart"></i>
        </div>
        <div id="guestArea">
            <a href="login.html"><button class="pink-btn">Đăng nhập</button></a>
            <a href="register.html"><button class="pink-btn">Đăng ký</button></a>
        </div>
    </div>

    <div>
        <ul class="nav justify-content-center menu">
            <li class="nav-item">
                <a class="nav-link " href="index.html">GIỚI THIỆU</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="bot.html">BỘT TRẮNG DA</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="kem.html">KEM TRẮNG DA</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="lienhe.html">LIÊN HỆ</a>
            </li>
        </ul>
    </div>

    
</body>
</html>
