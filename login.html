<!DOCTYPE html>
<html lang="vi">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Đăng nhập</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#ffe8f0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.login-box{
background:white;
width:360px;
padding:30px;
border-radius:20px;
text-align:center;
box-shadow:0 0 15px rgba(0,0,0,0.1);
}

.login-box h2{
margin-bottom:20px;
}

.login-box input{
width:100%;
padding:12px;
margin:10px 0;
border-radius:10px;
border:1px solid #ddd;
}

.btn-login{
width:100%;
margin-top:15px;
background:#ff6ea8;
color:white;
padding:12px;
border:none;
border-radius:30px;
font-weight:bold;
cursor:pointer;
}

.btn-login:hover{
background:#ff3e8e;
}

.login-box p{
margin-top:15px;
}

.login-box p a{
color:#ff6ea8;
text-decoration:none;
font-weight:bold;
cursor:pointer;
}

</style>
</head>

<body>

<div class="login-box">

<h2 id="title">Đăng nhập</h2>

<input id="username" placeholder="Tên đăng nhập">

<input id="password" type="password" placeholder="Mật khẩu">

<button class="btn-login" onclick="login()">Đăng nhập</button>

<p id="switchText">
Chưa có tài khoản?
<a onclick="showRegister()">Đăng ký</a>
</p>

</div>

<script>

function showRegister(){

document.getElementById("title").innerText="Đăng ký";

document.querySelector(".btn-login").innerText="Đăng ký";

document.querySelector(".btn-login").setAttribute("onclick","register()");

document.getElementById("switchText").innerHTML=
'Đã có tài khoản? <a onclick="showLogin()">Đăng nhập</a>';

}

function showLogin(){

document.getElementById("title").innerText="Đăng nhập";

document.querySelector(".btn-login").innerText="Đăng nhập";

document.querySelector(".btn-login").setAttribute("onclick","login()");

document.getElementById("switchText").innerHTML=
'Chưa có tài khoản? <a onclick="showRegister()">Đăng ký</a>';

}

function register(){

let username=document.getElementById("username").value;
let password=document.getElementById("password").value;

let user={
username:username,
password:password
};

localStorage.setItem("user",JSON.stringify(user));

alert("Đăng ký thành công! Hãy đăng nhập.");

showLogin();

}

function login(){

let username=document.getElementById("username").value;
let password=document.getElementById("password").value;

let user=JSON.parse(localStorage.getItem("user"));

if(user && username===user.username && password===user.password){

localStorage.setItem("loggedUser",username);

alert("Đăng nhập thành công");

window.location.href="index.html";

}else{

alert("Sai tài khoản hoặc mật khẩu");

}

}

</script>

</body>
</html>
