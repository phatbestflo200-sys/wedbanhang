<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng ký</title>
  <style>
  * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial;
    }

    body {
      background: #ffe8f0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .login-box {
      background: white;
      width: 360px;
      padding: 30px;
      border-radius: 20px;
      text-align: center;
      box-shadow: 0 0 15px rgba(0, 0, 0, 0.1);
    }

    .login-box h2 {
      margin-bottom: 20px;
    }

    .login-box input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 10px;
      border: 1px solid #ddd;
    }

    .btn-login {
      display: block;
      margin-top: 15px;
      background: #ff6ea8;
      color: white;
      padding: 12px;
      border-radius: 30px;
      text-decoration: none;
      font-weight: bold;
    }

    .btn-login:hover {
      background: #ff3e8e;
    }

    .login-box p {
      margin-top: 15px;
    }

    .login-box p a {
      color: #ff6ea8;
      text-decoration: none;
      font-weight: bold;
    }
  </style>
</head>

<body>

  <div class="box">

<h2>Đăng ký</h2>

<input id="username" placeholder="Tên đăng nhập">

<input id="password" type="password" placeholder="Mật khẩu">

<button onclick="register()">Đăng ký</button>

<p>Đã có tài khoản? <a href="login.html">Đăng nhập</a></p>

</div>

<script>

function register(){

let username=document.getElementById("username").value;
let password=document.getElementById("password").value;

let user={
username:username,
password:password
};

localStorage.setItem("user",JSON.stringify(user));

alert("Đăng ký thành công");

window.location.href="login.html";

}

</script>

</body>

</html>
